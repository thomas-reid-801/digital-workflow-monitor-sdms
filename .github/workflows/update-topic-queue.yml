name: Update Topic Queue

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"   # daily ~7 AM Central (12:00 UTC)

permissions:
  contents: write

concurrency:
  group: update-topic-queue
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Selftest (offline)
        run: python generator/gen_topic_queue.py --selftest

      - name: Generate docs/topic-queue.html from live Jira
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python generator/gen_topic_queue.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/topic-queue.html
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore: refresh topic queue dashboard"
            git push
          fi
